version: '3' # Docker Compose file version
services: # docker build, docker run, port, gan volumes
 build_html:
   container_name: cons-html
   build: ./html # docker build .
   #image:
   ports:
     - 3001:80
 build_node:
   container_name: cons-node
   build: ./backend_nodejs
   ports:
    - 8088:8088
   environment:
    - DATABASE_HOST=cons-mysql

   volumes:
    - ./backend_nodejs:/nodejs
    - /nodejs/node_modules
   networks:
    - demo_network

networks:
  demo_network:
   external: true

# docker-compose up -d
# docker-compose down
# docker-compose build --> docker-compose up -d